databases:
  - name: coding-db
    databaseName: codingdb
    user: dbuser
    plan: free

services:
  - type: web
    name: coding-interview-platform
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    disk:
      name: sqlite-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: coding-db
          property: connectionString

